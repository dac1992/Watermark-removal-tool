name: Build and Deploy

# 只要 main 或 master 分支有代码推送，就会触发此流程
on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 拉取代码 (Checkout Code)
        uses: actions/checkout@v4

      - name: 2. 安装 Node.js (Setup Node)
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 对应你宝塔上使用的 Node 版本

      - name: 3. 在 GitHub 服务器上安装依赖并打包
        run: |
          npm install
          npm run build
          # prune 命令会删除只在开发环境中用到的包，减小最终发送给服务器的体积
          npm prune --production

      - name: 4. 通过 SCP 将所有文件发送到你的服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PWD }}
          port: 22
          # 拷贝当前项目下全部文件到服务器的这个目录
          source: "./*"
          target: "/www/wwwroot/watermark-removal-tool/"
          rm: false # 不要自动清空文件夹

      - name: 5. 传输完后，自动重启服务器面的 PM2 服务
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PWD }}
          port: 22
          script: |
            cd /www/wwwroot/watermark-removal-tool
            pm2 restart watermark_removal_tool || echo "如果 PM2 命令没找到，您可以在宝塔面板里手动点击一下重启。"
