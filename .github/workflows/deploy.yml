name: Auto Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PWD }}
          port: 22
          script: |
            # 1. 切换到宝塔里的网站目录
            cd /www/wwwroot/watermark-removal-tool
            
            # 2. 拉取我刚刚在 AI Studio 修改后的最新代码
            git pull
            
            # 3. 安装可能新增的依赖
            npm install --registry=https://registry.npmmirror.com
            
            # 4. 执行构建打包
            npm run build
            
            # 5. 重启 PM2 服务 (这里的名字必须和你宝塔里填的项目名称一致)
            pm2 restart watermark_removal_tool
